<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prepárate UANL</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="inicio-body">

  <div class="overlay"></div>

  <main class="inicio-container">
    <div class="logo-box">
      <h1>Asesorías ModuleByte</h1>
      <p class="subtitulo">
        Inicia sesión para continuar con tu ruta de estudio.
      </p>

      <form class="login-form" onsubmit="iniciarSesion(event)">
        <input type="text" id="usuario" placeholder="Usuario" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <p id="mensajeLogin" class="mensaje-login"></p>

        <button class="btn-iniciar" type="submit">Iniciar sesión</button>
      </form>
    </div>
  </main>

  <script>
    function iniciarSesion(event) {
      event.preventDefault();

      const usuario = document.getElementById("usuario").value;
      const password = document.getElementById("password").value;
      const mensaje = document.getElementById("mensajeLogin");

      if (usuario === "admin" && password === "1234") {
        localStorage.setItem("usuarioActivo", usuario);
        window.location.href = "dashboard.html";
      } else {
        mensaje.innerText = "Usuario o contraseña incorrectos.";
      }
    }
  </script>

</body>
</html>
