<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Facultades</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <div class="menu">
      <span>Facultades</span>
      <div class="dropdown">
        <p onclick="cargarFacultad('fcfm')">FCFM</p>
        <p onclick="cargarFacultad('fime')">FIME</p>
      </div>
    </div>
  </nav>

  <h2 id="titulo">Selecciona una facultad</h2>

  <div id="materias" class="cards"></div>

  <script src="js/data.js"></script>
  <script>
    function cargarFacultad(facultad) {
      const contenedor = document.getElementById("materias");
      contenedor.innerHTML = "";

      data[facultad].forEach(m => {
        contenedor.innerHTML += `
          <div class="card" onclick="abrirMateria('${m.id}')">
            <h3>${m.nombre}</h3>
          </div>
        `;
      });
    }

    function abrirMateria(id) {
      localStorage.setItem("materia", id);
      window.location.href = "materia.html";
    }
  </script>

</body>
</html>
